<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício_Logica_Python_v2.py</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #0e1117; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #1a1a1a;
            overflow: hidden;
        }

        #container {
            background: #ffffff;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 85%;
            max-width: 350px;
            text-align: center;
            z-index: 10;
        }

        #loader {
            font-family: 'Courier New', monospace;
            color: #333;
            font-size: 14px;
            text-align: left;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 30px;
            display: none;
        }

        .buttons {
            display: none;
            justify-content: space-around;
            align-items: center;
            width: 100%;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            min-width: 100px;
        }

        /* Cores solicitadas */
        #btnSim {
            background-color: #28a745; /* VERDE */
            color: white;
        }

        #btnNao {
            background-color: #dc3545; /* VERMELHO */
            color: white;
            transition: all 0.1s ease;
            z-index: 999;
        }

        #mensagem {
            display: none;
            animation: fadeIn 1s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="container">
        <div id="loader">
            <p>> python logic_check.py</p>
            <p>> loading assets...</p>
        </div>

        <div id="conteudo-principal">
            <h1 id="pergunta">Tiffani Lustosa, você quer me dar uns beijinhos?</h1>
            <div class="buttons" id="area-botoes">
                <button id="btnSim" onclick="aceitou()">SIM!</button>
                <button id="btnNao" onmouseover="fugir()" onclick="fugir()">Não</button>
            </div>
        </div>
        
        <div id="mensagem">
            <h2 style="color: #28a745;">Eu já sabia hahaha! ❤️</h2>
            <p>Mal posso esperar para te ver novamente, gatinha!</p>
        </div>
    </div>

    <script>
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('pergunta').style.display = 'block';
            document.getElementById('area-botoes').style.display = 'flex';
        }, 2000);

        function fugir() {
            const btnNao = document.getElementById('btnNao');
            
            // Define limites para o botão não sair da área visível da tela
            const pad = 50;
            const maxX = window.innerWidth - btnNao.offsetWidth - pad;
            const maxY = window.innerHeight - btnNao.offsetHeight - pad;

            // Gera posições aleatórias
            const newX = Math.random() * maxX;
            const newY = Math.random() * maxY;

            btnNao.style.position = 'fixed';
            btnNao.style.left = newX + 'px';
            btnNao.style.top = newY + 'px';
        }

        function aceitou() {
            document.getElementById('conteudo-principal').style.display = 'none';
            document.getElementById('mensagem').style.display = 'block';
        }
    </script>
</body>
</html>
