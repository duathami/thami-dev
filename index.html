<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exercício_Logica_Python_v2.py</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #0e1117; 
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        #container {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 28px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            width: 85%;
            max-width: 380px;
            text-align: center;
            z-index: 10;
        }

        #loader {
            font-family: monospace;
            color: #444;
            font-size: 13px;
            text-align: left;
            margin-bottom: 25px;
            border-left: 3px solid #28a745;
            padding-left: 10px;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 35px;
            display: none;
            color: #000;
        }

        .buttons {
            display: none;
            justify-content: center;
            gap: 15px;
        }

        button {
            padding: 16px 30px;
            font-size: 18px;
            font-weight: 800;
            border: none;
            border-radius: 15px;
            cursor: pointer;
        }

        #btnSim {
            background-color: #28a745;
            color: #fff;
        }

        #btnNao {
            background-color: #dc3545;
            color: #fff;
            position: relative;
            /* Desativa qualquer interação padrão de clique no celular */
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        #mensagem {
            display: none;
            color: #000;
        }

        #mensagem h2 { color: #28a745; }
    </style>
</head>
<body>

    <div id="container">
        <div id="loader">
            <p>> python logic_check.py</p>
            <p>> loading_modules...</p>
        </div>

        <div id="conteudo-principal">
            <h1 id="pergunta">Tiffani Lustosa, você quer me dar uns beijinhos?</h1>
            <div class="buttons" id="area-botoes">
                <button id="btnSim" onclick="aceitou()">SIM!</button>
                <button id="btnNao" onpointerdown="fugir()">Não</button>
            </div>
        </div>
        
        <div id="mensagem">
            <h2>Eu já sabia! ❤️</h2>
            <p>Mal posso esperar para te ver novamente, gatinha!</p>
        </div>
    </div>

    <script>
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('pergunta').style.display = 'block';
            document.getElementById('area-botoes').style.display = 'flex';
        }, 2000);

        function fugir() {
            const btnNao = document.getElementById('btnNao');
            
            // Impede que o botão seja "clicado" enquanto foge
            const offset = 80;
            const maxX = window.innerWidth - btnNao.offsetWidth - offset;
            const maxY = window.innerHeight - btnNao.offsetHeight - offset;

            const newX = Math.random() * maxX + (offset/2);
            const newY = Math.random() * maxY + (offset/2);

            btnNao.style.position = 'fixed';
            btnNao.style.left = newX + 'px';
            btnNao.style.top = newY + 'px';
        }

        function aceitou() {
            document.getElementById('conteudo-principal').style.display = 'none';
            document.getElementById('mensagem').style.display = 'block';
        }

        // Bloqueia qualquer clique acidental no botão Não em nível de sistema
        document.getElementById('btnNao').addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
        });
    </script>
</body>
</html>
