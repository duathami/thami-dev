<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Desafio_Logica_v3.exe</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #0e1117;
            font-family: 'Inter', sans-serif;
            color: #fff;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            width: 85%;
            max-width: 350px;
            text-align: center;
            color: #000;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .hidden { display: none; }

        /* Estilo dos Botões e Alvos */
        .target {
            width: 60px;
            height: 60px;
            background-color: #28a745;
            border-radius: 10px;
            margin: 20px auto;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        #btnSim { background-color: #28a745; color: white; padding: 15px 30px; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; }
        #btnNao { background-color: #dc3545; color: white; padding: 15px 30px; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; position: relative; }

        #mensagem-final h2 { color: #28a745; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="fase1">
            <p style="font-family: monospace; font-size: 12px; color: #666;">> estagio_1: teste_reflexo</p>
            <h3 id="instrucao">Capture o quadrado verde <span id="contagem">5</span> vezes para liberar o sistema.</h3>
            <div id="alvo" class="target" onclick="cliqueAlvo()">GO!</div>
        </div>

        <div id="fase-final" class="hidden">
            <p style="font-family: monospace; font-size: 12px; color: #28a745;">> ACESSO LIBERADO!</p>
            <h2>Tiffani Lustosa, você quer me dar uns beijinhos?</h2>
            <div style="display: flex; justify-content: space-around; margin-top: 20px;">
                <button id="btnSim" onclick="vitoria()">SIM!</button>
                <button id="btnNao" onpointerdown="fugir()">Não</button>
            </div>
        </div>

        <div id="mensagem-final" class="hidden">
            <h2>Eu já sabia! ❤️</h2>
            <p>A recompensa pela vitória é o meu cheiro no seu pescoço em breve...</p>
        </div>
    </div>

    <script>
        let cliques = 5;

        function cliqueAlvo() {
            cliques--;
            document.getElementById('contagem').innerText = cliques;

            if (cliques <= 0) {
                document.getElementById('fase1').classList.add('hidden');
                document.getElementById('fase-final').classList.remove('hidden');
                return;
            }

            // Move o alvo de lugar
            const alvo = document.getElementById('alvo');
            const maxX = window.innerWidth - 100;
            const maxY = window.innerHeight - 100;
            alvo.style.position = 'fixed';
            alvo.style.left = Math.random() * maxX + 'px';
            alvo.style.top = Math.random() * maxY + 'px';
        }

        function fugir() {
            const btnNao = document.getElementById('btnNao');
            const maxX = window.innerWidth - btnNao.offsetWidth - 50;
            const maxY = window.innerHeight - btnNao.offsetHeight - 50;

            btnNao.style.position = 'fixed';
            btnNao.style.left = Math.random() * maxX + 'px';
            btnNao.style.top = Math.random() * maxY + 'px';
        }

        function vitoria() {
            document.getElementById('fase-final').classList.add('hidden');
            document.getElementById('mensagem-final').classList.remove('hidden');
        }

        // Bloqueio extra para o botão Não no mobile
        document.getElementById('btnNao').addEventListener('click', (e) => e.preventDefault());
    </script>
</body>
</html>
